<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Future of Labor — Dream Agent</title>

  <style>
    body {
      margin: 0;
      background: #050505;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.5;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.4),
        rgba(0,0,0,0.8)
      );
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      padding: 20px;
    }

    .logo {
      width: 70px;
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
    }

    .subtext {
      opacity: 0.85;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 30px;
    }

    button {
      background: transparent;
      border: 1px solid #f0f0f0;
      color: #f0f0f0;
      padding: 12px 24px;
      margin: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #f0f0f0;
      color: #050505;
    }

    .mid {
      padding: 80px 20px;
      text-align: center;
      max-width: 700px;
      margin: auto;
      line-height: 1.7;
      opacity: 0.85;
    }

    .footer {
      text-align: center;
      padding: 50px;
      opacity: 0.6;
    }
  </style>
</head>
<body data-artwork-slug="future-of-labor">

  <!-- HERO -->
  <section class="hero">
    <img src="../images/future_of_labor.png" class="hero-img" />

    <div class="overlay"></div>

    <div class="content">
      <img src="../images/DreamAgentBlue.jpg" class="logo"/>

      <h1>The Future of Labor</h1>

      <p class="subtext">
        Work is being restructured.<br/>
        Most people haven’t noticed yet.
      </p>

      <div class="buttons">
        <button onclick="enterArchive()">Enter the Archive</button>
        <button onclick="acquire()">Acquire the Work</button>
      </div>
    </div>
  </section>

  <!-- MID -->
  <section class="mid">
    <p>
      The system does not remove labor.<br/>
      It redefines where it exists.
    </p>

    <p>
      What disappears is not work.<br/>
      It is visibility.
    </p>
  </section>

  <!-- FOOTER -->
  <section class="footer">
    <p>Participation is no longer obvious.</p>
  </section>

<script>
function enterArchive() {
  trackEvent("enter_archive_click", {
    destination: "https://dreamagent.art/collection_pages/industrial#the-future-of-industry"
  });
  window.location.href = "https://dreamagent.art/collection_pages/industrial#the-future-of-industry";
}

function acquire() {
  trackEvent("acquire_click", {
    destination: "https://xrp.cafe/nft/00081388B57E780C6A5EF299540E01B0E8C6DB1B83CFC91675DD2ED405CBFA3B"
  });
  window.location.href = "https://xrp.cafe/nft/00081388B57E780C6A5EF299540E01B0E8C6DB1B83CFC91675DD2ED405CBFA3B";
}
</script>

</body>
</html>
